name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Vet & build
        run: |
          go vet ./...
          go build -o /tmp/mailchamp-api .

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/mailchamp?sslmode=disable
          BETTER_AUTH_SECRET: ci-better-auth-secret-at-least-32b
          BETTER_AUTH_URL: http://localhost:3000
          GO_API_URL: http://localhost:8080
          MAILCHAMP_JWT_SECRET: ci-mailchamp-jwt-secret-at-least-32b
        run: npm run build
