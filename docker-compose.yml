services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mailchamp
      POSTGRES_PASSWORD: mailchamp
      POSTGRES_DB: mailchamp
    ports:
      - "5432:5432"
    volumes:
      - mailchamp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailchamp -d mailchamp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://mailchamp:mailchamp@db:5432/mailchamp?sslmode=disable
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MAILCHAMP_JWT_SECRET: ${MAILCHAMP_JWT_SECRET:-dev-jwt-secret-change-me-32chars!!}
      PORT: "8080"
      GEMINI_MODEL: gemini-3-flash-preview
      GEMINI_FALLBACKS: gemini-3.1-flash-lite-preview
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://mailchamp:mailchamp@db:5432/mailchamp?sslmode=disable
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-auth-secret-change-me-32chars!}
      BETTER_AUTH_URL: http://localhost:3000
      GO_API_URL: http://api:8080
      MAILCHAMP_JWT_SECRET: ${MAILCHAMP_JWT_SECRET:-dev-jwt-secret-change-me-32chars!!}
    depends_on:
      - api
      - db

volumes:
  mailchamp_pg:
